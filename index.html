<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0A0A0A; color: #E8E0D0; font-family: Georgia, serif; min-height: 100vh; }
input, button { font-family: Georgia, serif; }
button { cursor: pointer; }
.header { background: linear-gradient(135deg, #1A0A00 0%, #0A0A0A 60%); border-bottom: 1px solid #2A1A0A; padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 480px; margin: 0 auto; }
.pb-wrap { height: 5px; background: #1A1A1A; border-radius: 3px; overflow: hidden; }
.pb-fill { height: 100%; border-radius: 3px; transition: width 0.6s; }
.quote-bar { background: #111; border-bottom: 1px solid #1E1E1E; padding: 10px 20px; text-align: center; font-size: 11px; color: #C8A96E; font-style: italic; }
.tabs { display: flex; border-bottom: 1px solid #1E1E1E; background: #0D0D0D; }
.tab-btn { flex: 1; padding: 13px 8px; background: none; border: none; border-bottom: 2px solid transparent; color: #444; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
.tab-btn.active { border-bottom-color: #C8A96E; color: #C8A96E; }
.content { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
.card { background: #111; border: 1px solid #1E1E1E; border-radius: 4px; padding: 16px; margin-bottom: 12px; }
.lbl { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.inp { width: 100%; padding: 14px; background: #0A0A0A; border: 1px solid #2A2A2A; border-radius: 3px; color: #F0E8D8; font-size: 15px; outline: none; font-family: Georgia, serif; }
.inp:focus { border-color: #C8A96E66; }
.btn-gold { width: 100%; padding: 15px; background: #C8A96E; border: none; border-radius: 3px; color: #0A0A0A; font-size: 13px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; font-family: Georgia, serif; }
.btn-ghost { width: 100%; padding: 11px; background: transparent; border: 1px solid #2A2A2A; border-radius: 3px; color: #444; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 12px; font-family: Georgia, serif; }
.btn-back { flex: 1; padding: 15px; background: transparent; border: 1px solid #2A2A2A; border-radius: 3px; color: #555; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-family: Georgia, serif; }
.opt-btn { padding: 12px 16px; background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 3px; color: #888; font-size: 13px; margin: 4px; font-family: Georgia, serif; }
.opt-btn.sel { background: #C8A96E22; border-color: #C8A96E; color: #C8A96E; }
.ms-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #161616; cursor: pointer; }
.ms-row:last-child { border-bottom: none; }
.chk { width: 18px; height: 18px; border-radius: 2px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid #333; }
.tk-row { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; cursor: pointer; border-bottom: 1px solid #161616; }
.tk-row:last-child { border-bottom: none; }
.sv-dot { font-size: 9px; color: #555; letter-spacing: 1px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { width: 100%; max-width: 380px; }
.err { font-size: 12px; color: #E07B6A; margin-bottom: 14px; text-align: center; }
.mb-wrap { height: 4px; background: #1A1A1A; border-radius: 2px; overflow: hidden; }
.mb { height: 100%; border-radius: 2px; transition: width 0.4s; }
.iq { font-size: 17px; color: #F0E8D8; line-height: 1.6; margin-bottom: 12px; font-weight: bold; }
.is { font-size: 12px; color: #555; margin-bottom: 20px; letter-spacing: 0.5px; line-height: 1.5; }
.steps { display: flex; gap: 4px; margin-bottom: 28px; }
.sd { flex: 1; height: 3px; border-radius: 2px; }
.gen { text-align: center; padding: 60px 20px; }
.spin { width: 40px; height: 40px; border: 2px solid #1E1E1E; border-top-color: #C8A96E; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px 20px; }
.yr-btn { flex: 1; padding: 10px 0; border: none; border-radius: 3px; font-size: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; font-family: Georgia, serif; }
.mo-btn { padding: 6px 10px; border: none; border-radius: 3px; font-size: 10px; font-family: Georgia, serif; margin: 2px; }
.slots-badge { display: inline-block; padding: 4px 10px; background: #C8A96E22; border: 1px solid #C8A96E44; border-radius: 20px; font-size: 10px; color: #C8A96E; letter-spacing: 1px; margin-bottom: 16px; }
</style>
</head>
